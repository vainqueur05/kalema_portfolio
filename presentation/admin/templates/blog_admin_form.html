<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ 'Modifier' if article else 'Ajouter' }} un article – Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={theme:{extend:{colors:{'netflix-dark':'#0A0A0A','netflix-card':'#141414','netflix-secondary':'#1E1E1E','netflix-accent':'#E50914'}}}}</script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-netflix-dark text-white flex">
    <aside class="w-72 bg-netflix-card min-h-screen p-6 border-r border-white/5 flex flex-col">
        <a href="/admin" class="text-2xl font-bold text-netflix-accent mb-10">VK<span class="text-white">.</span></a>
        <nav class="flex-1 space-y-1 text-sm">
            <a href="/admin" class="flex items-center gap-3 py-3 px-4 rounded-xl hover:bg-netflix-secondary transition"><i class="fas fa-tachometer-alt w-5"></i> Dashboard</a>
            <a href="/admin/blog" class="flex items-center gap-3 py-3 px-4 rounded-xl bg-netflix-accent text-white"><i class="fas fa-blog w-5"></i> Blog</a>
        </nav>
        <div class="pt-4 border-t border-white/5">
            <a href="/admin/logout" class="flex items-center gap-3 py-3 px-4 rounded-xl text-red-400 hover:bg-netflix-secondary text-sm"><i class="fas fa-sign-out-alt w-5"></i> Déconnexion</a>
        </div>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto">
        <div class="max-w-3xl">
            <h1 class="text-4xl font-bold mb-2">{{ 'Modifier' if article else 'Ajouter' }} un <span class="text-netflix-accent">article</span></h1>
            <p class="text-gray-400 mb-8">Remplissez les champs ci-dessous pour publier votre article.</p>

            <form method="POST" class="space-y-6">
                <div class="bg-netflix-card p-6 rounded-2xl border border-white/5">
                    <label class="block text-sm text-gray-400 mb-2 font-medium">Titre de l'article</label>
                    <input type="text" name="titre" placeholder="Un titre accrocheur..." value="{{ article.titre if article else '' }}" class="w-full bg-netflix-dark border border-white/10 rounded-xl px-5 py-3.5 text-white focus:border-netflix-accent focus:outline-none transition" required>
                </div>

                <div class="bg-netflix-card p-6 rounded-2xl border border-white/5">
                    <label class="block text-sm text-gray-400 mb-2 font-medium">Contenu</label>
                    <textarea name="contenu" rows="12" placeholder="Rédigez votre article..." class="w-full bg-netflix-dark border border-white/10 rounded-xl px-5 py-4 text-white focus:border-netflix-accent focus:outline-none transition" required>{{ article.contenu if article else '' }}</textarea>
                </div>

                <div class="bg-netflix-card p-6 rounded-2xl border border-white/5">
                    <label class="block text-sm text-gray-400 mb-2 font-medium">URL de l'image de couverture</label>
                    <input type="text" name="image_url" placeholder="https://i.ibb.co/xxxxx/image.jpg" value="{{ article.image_url if article else '' }}" class="w-full bg-netflix-dark border border-white/10 rounded-xl px-5 py-3.5 text-white focus:border-netflix-accent focus:outline-none transition">
                    <p class="text-xs text-gray-500 mt-1">Collez l'URL directe de votre image (ImgBB, Cloudinary...)</p>
                    {% if article and article.image_url %}
                    <img src="{{ article.image_url }}" class="w-48 h-32 object-cover rounded-xl mt-3 border border-white/5">
                    {% endif %}
                </div>

                <button type="submit" class="bg-netflix-accent text-white px-8 py-3.5 rounded-xl font-semibold hover:bg-red-700 transition flex items-center gap-2">
                    <i class="fas fa-check"></i> {{ 'Mettre à jour' if article else 'Publier l\'article' }}
                </button>
            </form>
        </div>
    </main>
</body>
</html>
