<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog – Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={theme:{extend:{colors:{'netflix-dark':'#0A0A0A','netflix-card':'#141414','netflix-secondary':'#1E1E1E','netflix-accent':'#E50914'}}}}</script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-netflix-dark text-white flex">
    <aside class="w-72 bg-netflix-card min-h-screen p-6 border-r border-white/5 flex flex-col">
        <a href="/admin" class="text-2xl font-bold text-netflix-accent mb-10">VK<span class="text-white">.</span></a>
        <nav class="flex-1 space-y-1 text-sm">
            <a href="/admin" class="flex items-center gap-3 py-3 px-4 rounded-xl hover:bg-netflix-secondary transition"><i class="fas fa-tachometer-alt w-5"></i> Dashboard</a>
            <a href="/admin/blog" class="flex items-center gap-3 py-3 px-4 rounded-xl bg-netflix-accent text-white"><i class="fas fa-blog w-5"></i> Blog</a>
        </nav>
        <div class="pt-4 border-t border-white/5">
            <a href="/admin/logout" class="flex items-center gap-3 py-3 px-4 rounded-xl text-red-400 hover:bg-netflix-secondary text-sm"><i class="fas fa-sign-out-alt w-5"></i> Déconnexion</a>
        </div>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto">
        <div class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-4xl font-bold">Articles</h1>
                <p class="text-gray-400 mt-1">{{ articles|length }} article(s) publié(s)</p>
            </div>
            <a href="/admin/blog/ajouter" class="bg-netflix-accent text-white px-5 py-3 rounded-xl font-semibold hover:bg-red-700 transition flex items-center gap-2">
                <i class="fas fa-plus"></i> Nouvel article
            </a>
        </div>

        <div class="grid gap-4">
            {% for a in articles %}
            <div class="bg-netflix-card p-6 rounded-2xl border border-white/5 flex flex-col md:flex-row justify-between md:items-center gap-4 hover:border-netflix-accent/30 transition">
                <div class="flex items-start gap-4">
                    {% if a.image_url %}
                    <img src="{{ a.image_url }}" class="w-16 h-16 rounded-xl object-cover flex-shrink-0">
                    {% else %}
                    <div class="w-16 h-16 rounded-xl bg-netflix-secondary flex items-center justify-center flex-shrink-0">
                        <i class="fas fa-newspaper text-2xl text-gray-500"></i>
                    </div>
                    {% endif %}
                    <div>
                        <p class="font-semibold text-lg text-white">{{ a.titre }}</p>
                        <p class="text-sm text-gray-400">{{ a.slug }}</p>
                        <span class="text-xs {% if a.actif %}text-green-400{% else %}text-red-400{% endif %} mt-1 inline-block">
                            {{ 'Actif' if a.actif else 'Inactif' }}
                        </span>
                    </div>
                </div>
                <div class="flex gap-3 text-sm flex-shrink-0">
                    <a href="/admin/blog/{{ a.id }}/modifier" class="px-4 py-2 bg-netflix-secondary rounded-xl hover:bg-blue-600 transition flex items-center gap-1">
                        <i class="fas fa-pen"></i> Modifier
                    </a>
                    <a href="/admin/blog/{{ a.id }}/supprimer" class="px-4 py-2 bg-netflix-secondary rounded-xl hover:bg-red-600 transition flex items-center gap-1" onclick="return confirm('Supprimer cet article ?')">
                        <i class="fas fa-trash"></i> Supprimer
                    </a>
                </div>
            </div>
            {% endfor %}
        </div>
    </main>
</body>
</html>
