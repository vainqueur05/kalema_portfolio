<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liens de contact – Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { colors: { 'netflix-dark': '#0A0A0A', 'netflix-card': '#141414', 'netflix-secondary': '#1E1E1E', 'netflix-accent': '#E50914' } } } }</script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-netflix-dark text-white flex">
    <aside class="w-72 bg-netflix-card min-h-screen p-6 border-r border-white/5 flex flex-col">
        <a href="/admin" class="text-2xl font-bold text-netflix-accent mb-10">VK<span class="text-white">.</span></a>
        <nav class="flex-1 space-y-1 text-sm">
            <a href="/admin" class="flex items-center gap-3 py-3 px-4 rounded-xl hover:bg-netflix-secondary transition"><i class="fas fa-tachometer-alt w-5"></i> Dashboard</a>
            <a href="/admin/profil" class="flex items-center gap-3 py-3 px-4 rounded-xl hover:bg-netflix-secondary transition"><i class="fas fa-user w-5"></i> Profil</a>
            <a href="/admin/projets" class="flex items-center gap-3 py-3 px-4 rounded-xl hover:bg-netflix-secondary transition"><i class="fas fa-folder w-5"></i> Projets</a>
            <a href="/admin/services" class="flex items-center gap-3 py-3 px-4 rounded-xl hover:bg-netflix-secondary transition"><i class="fas fa-cogs w-5"></i> Services</a>
            <a href="/admin/liens" class="flex items-center gap-3 py-3 px-4 rounded-xl bg-netflix-accent text-white"><i class="fas fa-link w-5"></i> Liens</a>
        </nav>
        <div class="pt-4 border-t border-white/5">
            <a href="/" class="flex items-center gap-3 py-3 px-4 rounded-xl hover:bg-netflix-secondary text-sm"><i class="fas fa-eye w-5"></i> Voir le site</a>
            <a href="/admin/logout" class="flex items-center gap-3 py-3 px-4 rounded-xl text-red-400 hover:bg-netflix-secondary text-sm"><i class="fas fa-sign-out-alt w-5"></i> Déconnexion</a>
        </div>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto">
        <div class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-4xl font-bold">Liens de contact</h1>
                <p class="text-gray-400 mt-1">{{ liens|length }} lien(s)</p>
            </div>
            <a href="/admin/liens/ajouter" class="bg-netflix-accent text-white px-5 py-3 rounded-xl font-semibold hover:bg-red-700 transition flex items-center gap-2">
                <i class="fas fa-plus"></i> Ajouter un lien
            </a>
        </div>

        <div class="grid gap-4">
            {% for lien in liens %}
            <div class="bg-netflix-card p-6 rounded-2xl border border-white/5 flex flex-col md:flex-row justify-between md:items-center gap-4 hover:border-netflix-accent/30 transition">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-xl bg-netflix-secondary flex items-center justify-center flex-shrink-0">
                        <i class="{{ lien.icone }} text-2xl text-netflix-accent"></i>
                    </div>
                    <div>
                        <p class="font-semibold text-lg text-white">{{ lien.nom }}</p>
                        <p class="text-sm text-gray-400 truncate max-w-xs">{{ lien.url }}</p>
                        <span class="text-xs {% if lien.actif %}text-green-400{% else %}text-red-400{% endif %}">
                            {{ 'Actif' if lien.actif else 'Inactif' }}
                        </span>
                    </div>
                </div>
                <div class="flex gap-2 text-sm flex-shrink-0">
                    <a href="/admin/liens/{{ lien.id }}/toggle" class="px-3 py-2 bg-netflix-secondary rounded-xl hover:bg-gray-600 transition">
                        <i class="fas fa-power-off"></i>
                    </a>
                    <a href="/admin/liens/{{ lien.id }}/modifier" class="px-4 py-2 bg-netflix-secondary rounded-xl hover:bg-blue-600 transition flex items-center gap-1">
                        <i class="fas fa-pen"></i> Modifier
                    </a>
                    <a href="/admin/liens/{{ lien.id }}/supprimer" class="px-4 py-2 bg-netflix-secondary rounded-xl hover:bg-red-600 transition flex items-center gap-1" onclick="return confirm('Supprimer ?')">
                        <i class="fas fa-trash"></i> Supprimer
                    </a>
                </div>
            </div>
            {% endfor %}
        </div>
    </main>
</body>
</html>
