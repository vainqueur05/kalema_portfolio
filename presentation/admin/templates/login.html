<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin – Bridge Afrika</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'netflix-dark': '#0A0A0A',
                        'netflix-card': '#141414',
                        'netflix-accent': '#E50914',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(229,9,20,0.3); }
            50% { box-shadow: 0 0 60px rgba(229,9,20,0.6); }
        }
        .float-animation { animation: float 3s ease-in-out infinite; }
        .glow-animation { animation: pulse-glow 2s ease-in-out infinite; }
    </style>
</head>
<body class="bg-netflix-dark flex items-center justify-center min-h-screen relative overflow-hidden">

    <!-- Fond animé -->
    <div class="absolute inset-0 opacity-10">
        <div class="absolute top-10 left-10 w-96 h-96 bg-netflix-accent rounded-full blur-3xl"></div>
        <div class="absolute bottom-10 right-10 w-64 h-64 bg-netflix-accent rounded-full blur-3xl"></div>
        <div class="absolute top-1/2 left-1/2 w-48 h-48 bg-white rounded-full blur-3xl"></div>
    </div>

    <!-- Carte de connexion -->
    <div class="relative z-10 w-full max-w-md mx-4">
        <div class="bg-netflix-card rounded-3xl border border-white/5 p-8 shadow-2xl backdrop-blur-sm">

            <!-- Logo animé -->
            <div class="text-center mb-8 float-animation">
                <div class="w-20 h-20 mx-auto bg-netflix-accent/10 rounded-full flex items-center justify-center glow-animation">
                    <i class="fas fa-shield-alt text-4xl text-netflix-accent"></i>
                </div>
                <h1 class="text-3xl font-bold text-white mt-4">Bridge Afrika</h1>
                <p class="text-gray-400 text-sm mt-1">Panneau d'administration</p>
            </div>

            <!-- Message d'erreur -->
            {% if error %}
            <div class="bg-red-900/30 border border-red-500 text-red-200 p-4 rounded-2xl mb-6 flex items-center gap-3 text-sm">
                <i class="fas fa-exclamation-triangle"></i> {{ error }}
            </div>
            {% endif %}

            <!-- Étape 1 : Identifiants -->
            {% if not show_2fa %}
            <form method="POST" class="space-y-5">
                <div>
                    <label class="block text-sm text-gray-400 mb-2 font-medium">Nom d'utilisateur</label>
                    <div class="relative">
                        <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
                        <input type="text" name="username" required class="w-full bg-netflix-dark border border-white/10 rounded-xl pl-11 pr-4 py-3 text-white focus:border-netflix-accent focus:outline-none transition" placeholder="votre identifiant" value="{{ username or '' }}">
                    </div>
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-2 font-medium">Mot de passe</label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
                        <input type="password" name="password" required class="w-full bg-netflix-dark border border-white/10 rounded-xl pl-11 pr-4 py-3 text-white focus:border-netflix-accent focus:outline-none transition" placeholder="••••••••">
                    </div>
                </div>
                <button type="submit" class="w-full bg-netflix-accent text-white py-3 rounded-xl font-semibold hover:bg-red-700 transition flex items-center justify-center gap-2 text-lg">
                    <i class="fas fa-sign-in-alt"></i> Se connecter
                </button>
            </form>
            {% endif %}

            <!-- Étape 2 : Code 2FA -->
            {% if show_2fa %}
            <div class="bg-netflix-accent/10 border border-netflix-accent/30 rounded-2xl p-6 mb-6 text-center">
                <i class="fas fa-shield-alt text-3xl text-netflix-accent mb-3"></i>
                <p class="text-white font-semibold mb-2">Vérification en deux étapes</p>
                <p class="text-netflix-muted text-sm">Un code de sécurité a été envoyé à votre adresse email.</p>
            </div>
            <form method="POST" class="space-y-5">
                <div>
                    <label class="block text-sm text-gray-400 mb-2 font-medium text-center">Code de sécurité</label>
                    <input type="text" name="code_2fa" placeholder="Entrez le code reçu" required 
                           class="w-full bg-netflix-dark border border-netflix-accent/30 rounded-xl px-4 py-4 text-white focus:border-netflix-accent focus:outline-none transition text-center text-2xl tracking-widest"
                           maxlength="6" autocomplete="off">
                    <input type="hidden" name="username" value="{{ username }}">
                    <input type="hidden" name="password" value="{{ password }}">
                </div>
                <button type="submit" class="w-full bg-netflix-accent text-white py-3 rounded-xl font-semibold hover:bg-red-700 transition flex items-center justify-center gap-2 text-lg">
                    <i class="fas fa-check"></i> Vérifier
                </button>
            </form>
            {% endif %}

            <!-- Lien retour -->
            <a href="/" class="flex items-center justify-center gap-2 text-sm text-gray-500 mt-6 hover:text-white transition">
                <i class="fas fa-arrow-left"></i> Retour au site
            </a>
        </div>

        <!-- Footer discret -->
        <p class="text-center text-gray-600 text-xs mt-6">
            &copy; 2026 Bridge Afrika – Accès réservé
        </p>
    </div>

</body>
</html>
