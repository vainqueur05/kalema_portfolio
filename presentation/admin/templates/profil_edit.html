<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifier le profil – Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { colors: { 'netflix-dark': '#0A0A0A', 'netflix-card': '#141414', 'netflix-secondary': '#1E1E1E', 'netflix-accent': '#E50914' } } } }</script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-netflix-dark text-white flex">
    <aside class="w-72 bg-netflix-card min-h-screen p-6 border-r border-white/5 flex flex-col">
        <a href="/admin" class="text-2xl font-bold text-netflix-accent mb-10">VK<span class="text-white">.</span></a>
        <nav class="flex-1 space-y-1 text-sm">
            <a href="/admin" class="flex items-center gap-3 py-3 px-4 rounded-xl hover:bg-netflix-secondary transition"><i class="fas fa-tachometer-alt w-5"></i> Dashboard</a>
            <a href="/admin/profil" class="flex items-center gap-3 py-3 px-4 rounded-xl bg-netflix-accent text-white"><i class="fas fa-user w-5"></i> Profil</a>
            <a href="/admin/projets" class="flex items-center gap-3 py-3 px-4 rounded-xl hover:bg-netflix-secondary transition"><i class="fas fa-folder w-5"></i> Projets</a>
        </nav>
        <div class="pt-4 border-t border-white/5">
            <a href="/" class="flex items-center gap-3 py-3 px-4 rounded-xl hover:bg-netflix-secondary text-sm"><i class="fas fa-eye w-5"></i> Voir le site</a>
            <a href="/admin/logout" class="flex items-center gap-3 py-3 px-4 rounded-xl text-red-400 hover:bg-netflix-secondary text-sm"><i class="fas fa-sign-out-alt w-5"></i> Déconnexion</a>
        </div>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto">
        <div class="max-w-2xl">
            <h1 class="text-4xl font-bold mb-2">Mon <span class="text-netflix-accent">profil</span></h1>
            <p class="text-gray-400 mb-8">Gérez vos informations personnelles affichées sur le portfolio.</p>

            {% if error %}
            <div class="bg-red-900/30 border border-red-500 text-red-200 p-4 rounded-2xl mb-8 flex items-center gap-3">
                <i class="fas fa-exclamation-triangle"></i> {{ error }}
            </div>
            {% endif %}

            <form method="POST" class="space-y-6">
                <div class="bg-netflix-card p-6 rounded-2xl border border-white/5 space-y-4">
                    <div>
                        <label class="block text-sm text-gray-400 mb-2 font-medium">Nom complet</label>
                        <input type="text" name="nom_complet" value="{{ profil.nom_complet if profil else '' }}" class="w-full bg-netflix-dark border border-white/10 rounded-xl px-5 py-3.5 text-white focus:border-netflix-accent focus:outline-none transition">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-2 font-medium">Titre professionnel</label>
                        <input type="text" name="titre" value="{{ profil.titre if profil else '' }}" class="w-full bg-netflix-dark border border-white/10 rounded-xl px-5 py-3.5 text-white focus:border-netflix-accent focus:outline-none transition">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-2 font-medium">Biographie</label>
                        <textarea name="bio" rows="5" class="w-full bg-netflix-dark border border-white/10 rounded-xl px-5 py-4 text-white focus:border-netflix-accent focus:outline-none transition">{{ profil.bio if profil else '' }}</textarea>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-2 font-medium">URL de la photo de profil</label>
                        <input type="text" name="photo_url" placeholder="https://i.ibb.co/xxxxx/photo.jpg" value="{{ profil.photo_url if profil else '' }}" class="w-full bg-netflix-dark border border-white/10 rounded-xl px-5 py-3.5 text-white focus:border-netflix-accent focus:outline-none transition">
                        <p class="text-xs text-gray-500 mt-1">Collez l'URL directe de votre image (ImgBB, Cloudinary...)</p>
                        {% if profil and profil.photo_url %}
                        <div class="mt-3">
                            <img src="{{ profil.photo_url }}" class="w-24 h-24 object-cover rounded-full border-2 border-netflix-accent">
                        </div>
                        {% endif %}
                    </div>
                </div>
                <button type="submit" class="bg-netflix-accent text-white px-8 py-3.5 rounded-xl font-semibold hover:bg-red-700 transition flex items-center gap-2">
                    <i class="fas fa-check"></i> Enregistrer
                </button>
            </form>
        </div>
    </main>
</body>
</html>
