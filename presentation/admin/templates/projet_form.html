<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ 'Modifier' if projet else 'Ajouter' }} un projet – Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { colors: { 'netflix-dark': '#0A0A0A', 'netflix-card': '#141414', 'netflix-secondary': '#1E1E1E', 'netflix-accent': '#E50914' } } } }</script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-netflix-dark text-white flex">
    <aside class="w-72 bg-netflix-card min-h-screen p-6 border-r border-white/5 flex flex-col">
        <a href="/admin" class="text-2xl font-bold text-netflix-accent mb-10">VK<span class="text-white">.</span></a>
        <nav class="flex-1 space-y-1 text-sm">
            <a href="/admin" class="flex items-center gap-3 py-3 px-4 rounded-xl hover:bg-netflix-secondary transition"><i class="fas fa-tachometer-alt w-5"></i> Dashboard</a>
            <a href="/admin/projets" class="flex items-center gap-3 py-3 px-4 rounded-xl bg-netflix-accent text-white"><i class="fas fa-folder w-5"></i> Projets</a>
        </nav>
        <div class="pt-4 border-t border-white/5">
            <a href="/admin/logout" class="flex items-center gap-3 py-3 px-4 rounded-xl text-red-400 hover:bg-netflix-secondary text-sm"><i class="fas fa-sign-out-alt w-5"></i> Déconnexion</a>
        </div>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto">
        <div class="max-w-3xl">
            <h1 class="text-4xl font-bold mb-2">{{ 'Modifier' if projet else 'Ajouter' }} un <span class="text-netflix-accent">projet</span></h1>
            <p class="text-gray-400 mb-8">Remplissez les détails de votre réalisation.</p>

            {% if error %}
            <div class="bg-red-900/30 border border-red-500 text-red-200 p-4 rounded-2xl mb-8 flex items-center gap-3">
                <i class="fas fa-exclamation-triangle"></i> {{ error }}
            </div>
            {% endif %}

            <form method="POST" enctype="multipart/form-data" class="space-y-6">
                <div class="bg-netflix-card p-6 rounded-2xl border border-white/5 space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm text-gray-400 mb-2 font-medium">Titre</label>
                            <input type="text" name="titre" value="{{ projet.titre if projet else '' }}" class="w-full bg-netflix-dark border border-white/10 rounded-xl px-4 py-3 text-white focus:border-netflix-accent focus:outline-none transition" required>
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-2 font-medium">Slug</label>
                            <input type="text" name="slug" value="{{ projet.slug if projet else '' }}" class="w-full bg-netflix-dark border border-white/10 rounded-xl px-4 py-3 text-white focus:border-netflix-accent focus:outline-none transition">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-2 font-medium">Description courte</label>
                        <textarea name="description_courte" rows="2" class="w-full bg-netflix-dark border border-white/10 rounded-xl px-4 py-3 text-white focus:border-netflix-accent focus:outline-none transition" required>{{ projet.description_courte if projet else '' }}</textarea>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-2 font-medium">Description longue</label>
                        <textarea name="description_longue" rows="6" class="w-full bg-netflix-dark border border-white/10 rounded-xl px-4 py-3 text-white focus:border-netflix-accent focus:outline-none transition" required>{{ projet.description_longue if projet else '' }}</textarea>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-2 font-medium">Histoire</label>
                        <textarea name="histoire" rows="4" class="w-full bg-netflix-dark border border-white/10 rounded-xl px-4 py-3 text-white focus:border-netflix-accent focus:outline-none transition">{{ projet.histoire if projet else '' }}</textarea>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-2 font-medium">Image</label>
                        <input type="file" name="image" accept="image/*" class="text-white file:bg-netflix-accent file:border-none file:px-4 file:py-2 file:rounded-xl file:cursor-pointer">
                        {% if projet and projet.image_url %}
                        <img src="{{ projet.image_url }}" class="w-32 h-24 object-cover rounded-xl mt-3 border border-white/5">
                        {% endif %}
                    </div>
                    <div class="flex items-center gap-6">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" name="actif" value="true" {% if projet and projet.actif %}checked{% endif %} class="w-4 h-4 accent-netflix-accent">
                            <span class="text-sm">Actif</span>
                        </label>
                        <div>
                            <label class="block text-xs text-gray-500 mb-1">Ordre</label>
                            <input type="number" name="ordre" value="{{ projet.ordre if projet else '0' }}" class="w-20 bg-netflix-dark border border-white/10 rounded-lg px-3 py-2 text-white text-sm focus:border-netflix-accent focus:outline-none transition">
                        </div>
                    </div>
                </div>
                <button type="submit" class="bg-netflix-accent text-white px-8 py-3.5 rounded-xl font-semibold hover:bg-red-700 transition flex items-center gap-2">
                    <i class="fas fa-check"></i> {{ 'Mettre à jour' if projet else 'Créer le projet' }}
                </button>
            </form>
        </div>
    </main>
</body>
</html>
